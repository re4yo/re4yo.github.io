<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed AlGhrbi</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: #fff;
        }
        
        /* Video background */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        
        /* Page content */
        .content {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            z-index: 1;
            text-align: center;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
            width: 150px;
        }

        .buttons a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            text-align: center;
            text-decoration: none;
            color: white;
            border-radius: 5px;
        }

        .twitter { background-color: #0073E6; }
        .rootless { background-color: #4EA9AD; }
        .roothide { background-color: #4EA9AD; }
    </style>
</head>
<body>

    <!-- Video background -->
    <video autoplay muted loop class="video-bg">
        <source src="path-to-your-video.mp4" type="video/mp4">
        <source src="path-to-your-video.webm" type="video/webm">
        Your browser does not support the video tag.
    </video>

    <!-- Main content -->
    <div class="content">
        <img src="https://i.imgur.com/Ao9WX2Z.jpeg" alt="Ahmed's Image" style="width: 150px; height: 150px; border-radius: 50%; margin-top: 20px;">
        <h1>Ahmed</h1>

        <div class="buttons">
            <a href="https://x.com/ipapplus" target="_blank" class="twitter">Twitter</a>
            <a href="sileo://source/https://qhtx.github.io/" target="_blank" class="rootless">Rootless</a>
            <a href="sileo://source/https://re4yo.github.io/" target="_blank" class="roothide">Roothide</a>
        </div>
    </div>

</body>
</html>
