<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@ipapplus</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: url('./file/back.jpg') no-repeat center center fixed;
    background-size: cover;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    color: #fff;
  }

  #profile-box {
    text-align: center;
    background: rgba(0, 0, 0, 0.7);
    padding: 40px 20px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    width: 300px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  #profile-box:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.7);
  }

  #profile-box img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin-bottom: 15px;
    box-shadow: 0 4px 8px rgba(255, 255, 255, 0.2);
  }

  #profile-box h2 {
    font-size: 1.5rem;
    margin: 10px 0;
    color: #f0f0f0;
  }

  #profile-box p {
    font-size: 1rem;
    font-style: italic;
    color: #b0c4de;
    margin-bottom: 20px;
  }

  .button-container a {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 8px auto;
    padding: 12px;
    color: white;
    background: #3b5998;
    border-radius: 8px;
    text-decoration: none;
    transition: background 0.3s, transform 0.2s;
    width: 80%;
  }

  .button-container a:hover {
    background: #4c669f;
    transform: scale(1.05);
  }

  .button-container a i {
    margin-right: 8px;
    font-size: 1.2rem;
  }
</style>
</head>
<body>
  <div id="profile-box">
    <img src="./file/profile.jpg" alt="Profile Picture">
    <h2>Ahmed AlGhrbi</h2>
    <p>سبحان الله وبحمده</p>
    <div class="button-container">
      <a href="sileo://source/https://a7m.dev" target="_blank"><i class="fab fa-github"></i>Repo</a>
      <a href="https://x.com/ipapplus" target="_blank"><i class="fab fa-twitter"></i>Twitter</a>
      <a href="https://t.me/ipapplus" target="_blank"><i class="fab fa-telegram"></i>Telegram</a>
    </div>
  </div>
</body>
</html>
